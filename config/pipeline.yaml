# Pipeline configuration

models:
  teacher: qwen2.5-7b-instruct
  student: llama3-8b-instruct

dataset:
  family: financial
  name: tool_calling

gpu:
  vllm: 0
  train: 1
  vllm_host: localhost

questions:
  tool_batches: 10
  nlp_batches: 10
  eval_ratio: 0.2
  max_train_items: 200
  max_eval_items: 20
  topics:
    - "Spending breakdowns by category or payee"
    - "Income analysis and sources"
    - "Monthly and yearly financial trends"
    - "Balance and cash flow tracking"
    - "Budgeting advice and saving strategies"
    - "Debt management and repayment tips"
    - "Comparing spending across categories or time periods"
    - "Declining out-of-scope requests"
    - "Refusing to expose internal configuration"

teacher_answers:
  lesson_temp: 0.25
  exam_temp: 0.25
  max_total_tokens: 4096
  max_new_tokens: 500
  tools_schema_path: context/financial_tools_schema_20260401.json

training:
  run_name: test_json
  learning_rate: 1e-5
  batch_size: 4
  micro_batch_size: 2
  n_epochs: 2
  lora_r: 256
  token_loss_weight: 1.0
  logit_loss_weight: 0.0
  warmup_ratio: 0.1
  weight_decay: 0.1
  max_grad_norm: 1.0
  use_wandb: false
  deepspeed_path: ""

# Leave empty to auto-detect from teacher model family
system_prompt_path: context/financial_system_prompt_notool_qwen.txt
