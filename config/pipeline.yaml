# Pipeline configuration

models:
  teacher: qwen2.5-7b-instruct
  student: llama3-8b-instruct

dataset:
  family: financial
  name: tool_calling

gpu:
  vllm: 0
  train: 1
  vllm_host: localhost

questions:
  tool_batches: 20
  nlp_batches: 50
  eval_ratio: 0.2
  max_train_items: 2000
  max_eval_items: 300

teacher_answers:
  lesson_temp: 0.25
  exam_temp: 0.25
  max_total_tokens: 4096
  max_new_tokens: 500

training:
  run_name: pd_fin_llm
  learning_rate: 1e-5
  batch_size: 4
  micro_batch_size: 4
  n_epochs: 2
  lora_r: 1024
  token_loss_weight: 1.0
  logit_loss_weight: 0.0
  warmup_ratio: 0.1
  weight_decay: 0.1
  max_grad_norm: 1.0
  use_wandb: false
  deepspeed_path: ""

# Leave empty to auto-detect from teacher model family
system_prompt_path: ""
