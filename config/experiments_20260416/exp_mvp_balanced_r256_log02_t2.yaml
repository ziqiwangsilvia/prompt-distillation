project:
  run_name: mvp_balanced_r256_log02_t2
  group_name: null
  train_only: true
  use_wandb: false
  system_prompt_path: context/financial_system_prompt_notool_qwen.txt
  tools_schema_path: context/financial_tools_schema_20260401.json
models:
  teacher: qwen2.5-72b-instruct
  student: llama3.1-8b-instruct
dataset:
  family: financial
  name: tool_calling
  variant: default
  datapath: output/teacher_answers
  custom_train_data: /fsx/shared/processed-data/llms/distillation/mvp_balanced/train.json
  custom_val_data: /fsx/shared/processed-data/llms/distillation/mvp_balanced/val.json
  distractor_dataset: ''
  partition_idx: null
  partition_type: null
gpu:
  vllm: 0,1
  train: 0,1,2,3,4
  teacher: 0,1,2
  vllm_host: localhost
questions:
  tool_batches: 10
  nlp_batches: 10
  eval_ratio: 0.2
  max_train_items: 200
  max_eval_items: 20
  question_temperature: 1.5
  lesson_num_choices: 1
  exam_num_choices: 1
  topics:
  - Spending breakdowns by category or payee
  - Income analysis and sources
  - Monthly and yearly financial trends
  - Balance and cash flow tracking
  - Budgeting advice and saving strategies
  - Debt management and repayment tips
  - Comparing spending across categories or time periods
  - Declining out-of-scope requests
  - Refusing to expose internal configuration
teacher_answers:
  lesson_temp: 0.25
  exam_temp: 0.25
  max_total_tokens: 4096
  max_new_tokens: 500
training:
  learning_rate: 1e-5
  batch_size: 4
  micro_batch_size: 1
  n_epochs: 2
  lora_r: 256
  mixed_precision: bf16
  closed_book: true
  use_tool_token: true
  test_mode: false
  token_loss_weight: 1.0
  logit_loss_weight: 0.2
  train_temperature: 2
  reverse_kl: false
  warmup_ratio: 0.1
  warmup_steps: null
  weight_decay: 0.1
  max_grad_norm: 1.0
  decay: true
  seed: 0
  eval_interval: -1
  log_interval: 1
  generation_interval: 0
  validate: true
  save: true
  save_during_training: false
  checkpoint_interval: 0
  checkpoint_interval_seconds: 0
  max_length: 0
  max_total_length: 0
  accelerate_config: config/accelerate_ddp_3gpu.yaml
